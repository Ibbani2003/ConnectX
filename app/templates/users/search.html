{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <h2 class="mb-4 font-weight-bold">Search Users</h2>
        
        <div class="glass-card p-4 mb-4">
            <form action="{{ url_for('users.search') }}" method="get" class="d-flex align-items-center">
                <div class="flex-grow-1 position-relative me-2">
                    <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                    <input type="text" name="q" class="form-control rounded-pill ps-5 bg-light" placeholder="Search by username or name..." value="{{ query }}">
                </div>
                <button type="submit" class="btn btn-gradient rounded-pill px-4">Search</button>
            </form>
        </div>

        {% if query %}
            <h5 class="mb-3">Results for "{{ query }}"</h5>
            {% if users %}
                <div class="list-group list-group-flush glass-card overflow-hidden">
                {% for user in users %}
                    <a href="{{ url_for('users.profile', username=user.username) }}" class="list-group-item list-group-item-action d-flex align-items-center p-3 bg-transparent border-bottom">
                        <img src="{{ url_for('static', filename='uploads/' + user.profile_image) }}" class="rounded-circle me-3" style="width: 50px; height: 50px; object-fit: cover;">
                        <div class="flex-grow-1">
                            <h6 class="mb-0 text-dark">{{ user.full_name or user.username }}</h6>
                            <small class="text-muted">@{{ user.username }}</small>
                        </div>
                        <i class="bi bi-chevron-right text-muted"></i>
                    </a>
                {% endfor %}
                </div>
            {% else %}
                <div class="glass-card p-5 text-center">
                    <i class="bi bi-search display-1 text-muted mb-3 d-block"></i>
                    <h5 class="text-muted">No users found.</h5>
                </div>
            {% endif %}
        {% endif %}
    </div>
</div>
{% endblock %}
